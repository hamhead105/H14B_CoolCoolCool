<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders – CoolCoolCool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                   Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      background: #f4f6f9; color: #1e293b;
    }

    /* ── top bar ─────────────────────────────────── */
    header {
      background: #1e293b; color: #fff; padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.25rem; }
    #auth-section { display: flex; gap: .5rem; align-items: center; }
    #auth-section input {
      padding: .4rem .6rem; border: none; border-radius: 4px; font-size: .85rem;
    }
    #auth-section button {
      padding: .4rem .8rem; border: none; border-radius: 4px;
      background: #3b82f6; color: #fff; cursor: pointer; font-size: .85rem;
    }
    #auth-status { font-size: .8rem; color: #94a3b8; }

    /* ── layout ──────────────────────────────────── */
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

    .card {
      background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1);
      padding: 1.25rem; margin-bottom: 1rem;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: .75rem;
    }
    .card-info h3 { font-size: 1rem; margin-bottom: .25rem; }
    .card-info p  { font-size: .85rem; color: #64748b; }

    .card-actions { display: flex; gap: .5rem; flex-wrap: wrap; }
    .card-actions button {
      padding: .45rem .9rem; border: none; border-radius: 6px;
      font-size: .8rem; cursor: pointer; font-weight: 500;
    }
    .btn-view   { background: #e0e7ff; color: #3730a3; }
    .btn-email  { background: #3b82f6; color: #fff; }
    .btn-email:disabled { opacity: .5; cursor: not-allowed; }

    /* ── modal ────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: none; justify-content: center; align-items: center; z-index: 100;
    }
    .overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 10px; width: 560px; max-width: 95vw;
      max-height: 85vh; overflow-y: auto; padding: 1.5rem;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
    }
    .modal h2 { margin-bottom: 1rem; font-size: 1.1rem; }
    .modal pre {
      background: #f1f5f9; padding: 1rem; border-radius: 6px;
      font-size: .75rem; overflow-x: auto; white-space: pre-wrap;
      word-break: break-all; max-height: 50vh;
    }
    .modal-actions { margin-top: 1rem; display: flex; gap: .5rem; justify-content: flex-end; }
    .modal-actions button {
      padding: .45rem 1rem; border: none; border-radius: 6px;
      cursor: pointer; font-size: .85rem;
    }
    .btn-close { background: #e2e8f0; color: #334155; }

    /* ── email form inside modal ─────────────────── */
    .email-form { margin-top: 1rem; display: flex; gap: .5rem; }
    .email-form input {
      flex: 1; padding: .45rem .7rem; border: 1px solid #cbd5e1;
      border-radius: 6px; font-size: .85rem;
    }

    /* ── toast ────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      padding: .75rem 1.25rem; border-radius: 8px;
      color: #fff; font-size: .85rem; z-index: 200;
      opacity: 0; transition: opacity .3s;
    }
    .toast.show   { opacity: 1; }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }

    .empty { text-align: center; color: #94a3b8; padding: 3rem 0; }
  </style>
</head>
<body>

<header>
  <h1>🧾 CoolCoolCool Orders</h1>
  <div id="auth-section">
    <input id="email-input"    type="email"    placeholder="Email" />
    <input id="password-input" type="password" placeholder="Password" />
    <button id="login-btn">Log in</button>
    <span id="auth-status"></span>
  </div>
</header>

<main>
  <div id="order-list"><p class="empty">Log in to view your orders.</p></div>
</main>

<!-- UBL XML preview modal -->
<div class="overlay" id="xml-modal">
  <div class="modal">
    <h2 id="modal-title">UBL XML</h2>
    <pre id="modal-xml"></pre>
    <div class="email-form">
      <input id="modal-email" type="email" placeholder="Recipient email address" />
      <button class="btn-email" id="modal-send-btn">📧 Send Email</button>
    </div>
    <div class="modal-actions">
      <button class="btn-close" id="modal-close-btn">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = window.location.origin;
  let TOKEN = null;
  let BUYER_ID = null;

  /* ── helpers ───────────────────────────────────── */
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  function authHeaders() {
    return { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
  }

  /* ── auth ──────────────────────────────────────── */
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email    = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;
    if (!email || !password) return toast('Enter email & password', 'error');

    try {
      const res = await fetch(`${API}/buyers/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');

      TOKEN = data.token;
      BUYER_ID = data.buyerId;
      document.getElementById('auth-status').textContent = `✓ buyer #${BUYER_ID}`;
      toast('Logged in');
      loadOrders();
    } catch (e) {
      toast(e.message, 'error');
    }
  });

  /* ── load orders ───────────────────────────────── */
  async function loadOrders() {
    const list = document.getElementById('order-list');
    list.innerHTML = '<p class="empty">Loading…</p>';

    try {
      const res = await fetch(`${API}/orders?buyerId=${BUYER_ID}`, { headers: authHeaders() });
      const orders = await res.json();
      if (!res.ok) throw new Error(orders.error || 'Failed to load orders');

      if (!orders.length) {
        list.innerHTML = '<p class="empty">No orders found.</p>';
        return;
      }

      list.innerHTML = orders.map(o => `
        <div class="card" data-id="${o.orderId}">
          <div class="card-info">
            <h3>${o.orderId}</h3>
            <p>Status: ${o.status} &nbsp;|&nbsp; Total: $${Number(o.totalCost).toFixed(2)} &nbsp;|&nbsp; ${new Date(o.createdAt).toLocaleDateString()}</p>
          </div>
          <div class="card-actions">
            <button class="btn-view" onclick="viewXml('${o.orderId}')">View UBL XML</button>
            <button class="btn-email" onclick="openEmailModal('${o.orderId}')">📧 Send Order</button>
          </div>
        </div>
      `).join('');
    } catch (e) {
      list.innerHTML = `<p class="empty" style="color:#dc2626">${e.message}</p>`;
    }
  }

  /* ── view XML in modal ─────────────────────────── */
  let currentOrderId = null;

  async function viewXml(orderId) {
    try {
      const res  = await fetch(`${API}/orders/${orderId}`, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to fetch order');

      currentOrderId = orderId;
      document.getElementById('modal-title').textContent = `UBL XML – ${orderId}`;
      document.getElementById('modal-xml').textContent = data.ublDocument;
      document.getElementById('modal-email').value = '';
      document.getElementById('xml-modal').classList.add('active');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function openEmailModal(orderId) {
    viewXml(orderId);            // reuse – opens modal, user types email and clicks send
  }

  /* ── send email ────────────────────────────────── */
  document.getElementById('modal-send-btn').addEventListener('click', async () => {
    const recipientEmail = document.getElementById('modal-email').value.trim();
    if (!recipientEmail) return toast('Enter a recipient email', 'error');
    if (!currentOrderId) return;

    const btn = document.getElementById('modal-send-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const res = await fetch(`${API}/orders/${currentOrderId}/email`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ recipientEmail })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Email failed');

      toast(data.message);
      document.getElementById('xml-modal').classList.remove('active');
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '📧 Send Email';
    }
  });

  /* ── close modal ───────────────────────────────── */
  document.getElementById('modal-close-btn').addEventListener('click', () => {
    document.getElementById('xml-modal').classList.remove('active');
  });
  document.getElementById('xml-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
  });
</script>
</body>
</html>
