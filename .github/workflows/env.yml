name: Create envfile
on: [push]
jobs:
  create-envfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make envfile from secrets/variables
        uses: SpicyPizza/create-envfile@v2.0
        with:
          # Values prefixed with 'envkey_' will be added to the .env file
          envkey_DEBUG: false
          envkey_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          file_name: .env # Optional, defaults to .env